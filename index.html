<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Contadora Natalia | Identidad Digital</title>
    <meta property="og:title" content="Contadora Natalia">
    <meta property="og:description" content="Tu tranquilidad contable, nuestro compromiso">
    <meta property="og:image" content="assets/foto-perfil.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-fijo">
        <div class="perfil-container">
            <img src="assets/foto-perfil.png" alt="Contadora" class="foto-perfil">
            <h1>Natalia Ramayo</h1>
            <p class="profesion">Contadora Pública Nacional</p>
            <p class="slogan"><em>"Tu tranquilidad contable, nuestro compromiso"</em></p>
        </div>
    </header>

    <main class="contenido-scroll">
        
        <section class="seccion-audio">
            <div class="audio-container" onclick="toggleAudio()">
                <div id="audio-visualizer" class="audio-icon">
                    <i class="fas fa-play" id="play-icon"></i>
                </div>
                <div class="audio-info">
                    <span id="audio-status">Audio informativo</span>
                    <!-- <small>Audio informativo</small> -->
                </div>
            </div>
        </section>

        <section class="seccion-carrusel">
            <h3>Servicios Profesionales</h3>
            <div class="carrusel-box">
                <p id="carrusel-texto">Cargando servicios...</p>
            </div>
        </section>

        <section class="seccion-consultas">
    <label for="tipo-consulta" class="label-consulta">¿Qué necesitás consultar?</label>
    
    <div class="select-wrapper">
        <select id="tipo-consulta" class="select-personalizado">
            <option value="Monotributo">Monotributo</option>
            <option value="Alta de Impuestos">Alta de Impuestos</option>
            <option value="Pagos de VEP">Pagos de VEP</option>
            <option value="Sueldos">Liquidación de Sueldos</option>
            <option value="Otra">Otra consulta general</option>
        </select>
    </div>

    <button onclick="enviarWhatsappPersonalizado()" class="btn-whatsapp-dinamico">
        <i class="fab fa-whatsapp"></i> ENVIAR CONSULTA POR WHATSAPP
    </button>
</section>

        <section class="grid-acciones">
           
            <div class="accion-item" onclick="copiarCBU()">
                <div class="icon-circle"><i class="fas fa-credit-card"></i></div>
                <span>Copiar CBU</span>
            </div>

            <div class="accion-item" onclick="window.location.href='mailto:nataliaramayo32@gmail.com'">
                <div class="icon-circle"><i class="fas fa-envelope"></i></div>
                <span>Email</span>
            </div>
        </section>

        <section class="seccion-vcf">
            <button class="btn-guardar" onclick="descargarVCF()">
                <i class="fas fa-user-plus"></i> AGENDAR CONTACTO
            </button>
        </section>


    </main>

            <div id="toast"></div>


    <footer class="footer-firma">
    <p>Impulsado por 
        <a href="https://tu-vcard.netlify.app" target="_blank"><strong>Visión Design</strong></a>
    </p>
    <a href="https://wa.me/5491137878083?text=Hola! Vengo de la vCard de la contadora Natalia y me gustaría consultar por una para mi." class="cta-firma">
        ¿Querés una tarjeta como esta?
    </a>
</footer>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
